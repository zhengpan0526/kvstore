# Default single-node kvstore config
# This file is loaded when no --config is specified.
# Paths are relative to the kvstore binary working directory.

# Server role: master | slave
role = master

# Listen port for client connections
port = 8080

# Master/slave sync port
# For master: port that slaves connect to for sync
# For slave: local port used to receive sync from master (optional)
sync_port = 9080

# Master address (used only when role=slave)
#master_ip = 127.0.0.1
#master_port = 8080

# AOF (Append Only File) persistence
# yes | no
enable_aof = no

# AOF fsync mode: always | everysec | no
# always   : fsync on every write (safest, slowest)
# everysec : fsync once per second (recommended)
# no       : rely on OS flush (fastest, less safe)
aof_fsync_mode = no

# AOF / RDB / snapshot file paths
# These should match the defaults in kvs_config_init_default
# and are relative to the working directory
aof_filename  = data/kvstore.aof
rdb_filename  = data/kvstore.rdb
dump_filename = data/kvstore.dat

# Logical max value size in bytes for a single key
# 0 means no logical limit (only protocol/implementation limits)
# e.g. 10485760 for 10MB
max_value_size = 10485760

# Network implementation mode (if supported by build)
# reactor | proactor | ntyco
#network_mode = reactor
